  // ===== 【可调：猫咪整体大小】=====
  // SIZE_SCALE 是倍率旋钮：嫌小就调大（1.2 / 1.5…），嫌大就调小（0.8）。

  const _short = Math.min(win.innerWidth, win.innerHeight);

  const SIDE_PAD   = Math.round(CAT_W * 77 / 300);

  const style = doc.createElement('style');

    }
    #mlfz-pet-container.no-anim { transition: none !important; }
    /* 点击热区：只覆盖猫的实际身体范围（去掉四周透明边距） */
    #mlfz-hitbox {
      position: absolute;
      left: ${SIDE_PAD}px; top: ${TOP_PAD}px;
      width: ${CAT_W - SIDE_PAD * 2}px;
      height: ${CAT_H - TOP_PAD - BOTTOM_PAD}px;

      touch-action: none;
      background: transparent;
      z-index: 2;

      width: ${CAT_W}px; height: ${CAT_H}px;
      background: transparent !important;
      image-rendering: pixelated;

      animation: mlfz-breathe 3.4s ease-in-out infinite;
      transform-origin: center bottom;

    @keyframes mlfz-breathe {

    @keyframes mlfz-walk {
      0%   { transform: rotate(-2.5deg) translateY(0); }

  container.classList.add('no-anim');
  setPos(posX, posY);
  setTimeout(() => container.classList.remove('no-anim'), 50);

  // ── 5. 表情切换（图片直接换src）
  let state = 'idle';
  let isDragging = false, dragMoved = false, pointerActive = false;

  const setFace = (s) => {
    state = s;
    if (s === 'angry') {
      catEl.src = IMG_ANGRY;
      zzzEl.classList.remove('show');
    } else if (s === 'sleep') {
      catEl.src = IMG_SLEEP;
      zzzEl.classList.add('show');
    } else {
      catEl.src = IMG_NORMAL;
      zzzEl.classList.remove('show');
    }
  };

  // 定时眨眼（只在idle时，瞬间闪一下闭眼睡觉图，形成真实眨眼效果）
  setInterval(() => {
    if (state !== 'idle' || isDragging) return;
    catEl.src = IMG_SLEEP;
    setTimeout(() => { if (state === 'idle') catEl.src = IMG_NORMAL; }, 130);
  }, 4200);

  // ── 6. 气泡
  let bubbleTimer = null;
  const say = (text, duration = 2400) => {
    clearTimeout(bubbleTimer);
    bubble.textContent = text;
    bubble.style.left = (CAT_W / 2) + 'px';
    bubble.classList.add('show');
    const w = bubble.offsetWidth;
    const margin = 6;
    const centerX = posX + CAT_W / 2;
    let bx = CAT_W / 2;
    if (centerX - w / 2 < margin)                  bx += margin - (centerX - w / 2);
    if (centerX + w / 2 > win.innerWidth - margin) bx -= (centerX + w / 2) - (win.innerWidth - margin);
    bubble.style.left = bx + 'px';
    bubbleTimer = setTimeout(() => bubble.classList.remove('show'), duration);
  };

  // ── 7. 丧萌文案
  const LINES = {
    idle: [
      '人，咪想泥', '人，人类的世界是怎么样的',
      '人，又在跟你的电子老公聊天呢', '如果咪不在了，你会想咪吗',
      '人，今天的空气是灰色的', '咪在看你', '咪占领了这里',
      '人，陪咪发会儿呆', '人，泥的手机有鱼的味道吗',
      '人，咪今天掉了三根毛', '活着好累，咪先躺了',
    ],
    night: ['人，怎么还不睡', '深夜的咪，和泥', '人，夜里想咪了吗'],
    morning: ['人，早', '咪刚睡醒，勿扰', '人，今天也要喂咪哦'],
    poke: ['人，干嘛戳咪', '咪被你戳扁了', '哼', '人，戳咪一下，想咪一天', '人，咪的毛乱了'],
    wake: ['谁！...哦，是人啊', '咪睡得好好的...'],
    dragStart: '人！放咪下来！',
    dragEnd: ['哼，咪记仇了', '咪原谅你了，这次', '人，咪晕了'],
    sleepy: ['咪睡了，人不许吵', '咪先睡了，人自己玩'],
    gameInvite: '人，你好烦，给你个游戏一边玩去',
    gameWatch: ['咪在监督泥', '人，往左一点', '就这水平？', '咪看好泥，一点点'],
    gameWin: ['人，勉强能看', '咪对泥刮目相看了，一点点'],
    gameLose: ['就这？人，就这？', '人，咪都看不下去了', '咪睡一觉泥都赢不了'],
    gameClose: '哼，玩够了？',
    remind: ['人，半小时了，咪命令你休息', '人，眼睛会坏的，听咪的'],
  };
  const pick = (arr) => arr[Math.floor(Math.random() * arr.length)];
  const idleLine = () => {
    const h = new Date().getHours();
    if ((h >= 23 || h < 5) && Math.random() < 0.5) return pick(LINES.night);
    if (h >= 6 && h < 10 && Math.random() < 0.5)   return pick(LINES.morning);
    return pick(LINES.idle);
  };

  // ── 8. 随机行为
  let behaviorInterval = null;
  let walkRAF = null;
  let lastSleepTime = 0;
  let gameOpen = false;
  const SLEEP_COOLDOWN = 10 * 60 * 1000;

  const edgeTarget = () => {
    const tx = Math.random() < 0.5
      ? (4 - SIDE_PAD) + Math.random() * 30
      : win.innerWidth - CAT_W - 4 + SIDE_PAD - Math.random() * 30;
    const ty = 60 + Math.random() * (win.innerHeight - CAT_H - 140);
    return [tx, ty];
  };

  // 平滑行走：requestAnimationFrame逐帧插值 + ease-in-out缓动，速度恒定
  const stopWalk = () => {
    if (walkRAF) { win.cancelAnimationFrame(walkRAF); walkRAF = null; }
    catEl.classList.remove('moving');
    container.classList.remove('no-anim');
  };
  const walkTo = (tx, ty) => {
    stopWalk();
    const sx = posX, sy = posY;
    const dist = Math.hypot(tx - sx, ty - sy);
    if (dist < 8) return;
    // 走得越远耗时越久，保持步速自然（约每秒180px），上下限兜底
    const duration = Math.max(800, Math.min(3600, dist / 180 * 1000));
    const ease = (t) => t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2;
    container.classList.add('no-anim');
    catEl.classList.add('moving');
    const t0 = win.performance.now();
    const step = (now) => {
      if (isDragging || gameOpen) { stopWalk(); return; }
      const p = Math.min(1, (now - t0) / duration);
      const e = ease(p);
      setPos(sx + (tx - sx) * e, sy + (ty - sy) * e);
      if (p < 1) { walkRAF = win.requestAnimationFrame(step); }
      else { stopWalk(); }
    };
    walkRAF = win.requestAnimationFrame(step);
  };

  const doRandomBehavior = () => {
    if (isDragging || gameOpen || state === 'angry') return;
    if (doc.visibilityState !== 'visible') return;
    if (state === 'sleep') {
      if (Math.random() < 0.3) setFace('idle');
      return;
    }
    const roll = Math.random();
    // ===== 【可调：各行为触发概率】阈值是累加的 =====
    // 走动 0~0.22、说话 0.22~0.42、歪头/弹跳 0.42~0.54、睡觉 0.54~0.62，其余发呆。
    // 想让猫更爱走动就调大第一个 0.22（后面几个数值跟着加同样多即可）。
    if (roll < 0.22) {
      const [tx, ty] = edgeTarget();
      walkTo(tx, ty);
    } else if (roll < 0.42) {
      say(idleLine(), 2800);
    } else if (roll < 0.54) {
      const anim = Math.random() < 0.6 ? 'tilt' : 'bounce';
      catEl.classList.remove('tilt', 'bounce');
      void catEl.offsetWidth;
      catEl.classList.add(anim);
      setTimeout(() => catEl.classList.remove(anim), 1700);
    } else if (roll < 0.62 && Date.now() - lastSleepTime > SLEEP_COOLDOWN) {
      lastSleepTime = Date.now();
      setFace('sleep');
      say(pick(LINES.sleepy), 2600);
    }
  };

  const startBehavior = () => {
    if (behaviorInterval) return;
    // ===== 【可调：行为节奏】每隔多少毫秒掷一次骰子决定下一个动作（越小越活跃）=====
    behaviorInterval = setInterval(doRandomBehavior, 11000);
  };
  const stopBehavior = () => {
    clearInterval(behaviorInterval); behaviorInterval = null;
    stopWalk(); // 行走途中被打断时，停帧并清掉残留动画类
  };
  startBehavior();

  // ── 9. 拖拽
  let dragOffsetX = 0, dragOffsetY = 0;
  let startX = 0, startY = 0;
  const DRAG_THRESHOLD = 8;

  const onPointerDown = (cx, cy) => {
    pointerActive = true;
    dragMoved = false; isDragging = false;
    dragOffsetX = cx - posX; dragOffsetY = cy - posY;
    startX = cx; startY = cy;
  };
  const onPointerMove = (cx, cy) => {
    if (!pointerActive) return;
    if (!dragMoved &&
        (Math.abs(cx - startX) > DRAG_THRESHOLD || Math.abs(cy - startY) > DRAG_THRESHOLD)) {
      dragMoved = true; isDragging = true;
      container.classList.add('no-anim');
      setFace('angry');
      catEl.classList.add('moving');
      say(LINES.dragStart, 1200);
    }
    if (isDragging) setPos(cx - dragOffsetX, cy - dragOffsetY, gameOpen);
  };
  const onPointerUp = () => {
    pointerActive = false;
    if (!isDragging) return;
    isDragging = false;
    catEl.classList.remove('moving');
    container.classList.remove('no-anim');
    setFace('idle');
    say(pick(LINES.dragEnd), 1800);
  };

  hitbox.addEventListener('touchstart', e => {
    onPointerDown(e.touches[0].clientX, e.touches[0].clientY);
  }, { passive: true });
  doc.addEventListener('touchmove', e => {
    if (!pointerActive) return;
    if (isDragging) e.preventDefault();
    onPointerMove(e.touches[0].clientX, e.touches[0].clientY);
  }, { passive: false });
  doc.addEventListener('touchend', onPointerUp);
  hitbox.addEventListener('mousedown', e => { e.preventDefault(); onPointerDown(e.clientX, e.clientY); });
  doc.addEventListener('mousemove', e => { onPointerMove(e.clientX, e.clientY); });
  doc.addEventListener('mouseup', onPointerUp);

  // ── 10. 戳一戳 + 连戳5下弹游戏
  let pokeCount = 0;
  let pokeResetTimer = null;

  hitbox.addEventListener('click', () => {
    if (dragMoved) return;
    if (state === 'sleep') {
      setFace('idle');
      say(pick(LINES.wake), 2000);
      pokeCount = 0;
      return;
    }
    pokeCount++;
    clearTimeout(pokeResetTimer);
    if (pokeCount >= 5) {
      pokeCount = 0;
      if (!gameOpen) {
        setFace('angry');
        say(LINES.gameInvite, 3500);
        spawnGameButton();
        setTimeout(() => { if (state === 'angry') setFace('idle'); }, 3800);
      }
    } else {
      catEl.classList.remove('bounce');
      void catEl.offsetWidth;
      catEl.classList.add('bounce');
      setTimeout(() => catEl.classList.remove('bounce'), 1100);
      say(pick(LINES.poke), 1800);
    }
    pokeResetTimer = setTimeout(() => { pokeCount = 0; }, 2200);
  });

  // ── 11. 游戏按钮
  const lockStyle = (el, props) => {
    for (const k in props) el.style.setProperty(k, props[k], 'important');
  };

  let gameBtnTimer = null;
  const spawnGameButton = () => {
    if (doc.getElementById('mlfz-game-btn') || gameOpen) return;
    const btn = doc.createElement('div');
    btn.id = 'mlfz-game-btn';
    btn.textContent = '一边玩去 ▸';
    lockStyle(btn, {
      'position': 'fixed', 'z-index': '100000',
      'background': '#2b2320', 'color': '#fffdf8',
      'border': '2px solid #fffdf8',
      'box-shadow': '0 4px 16px rgba(0,0,0,0.45)',
      'font-family': 'monospace, sans-serif',
      'font-size': '15px', 'font-weight': 'bold',
      'padding': '10px 18px', 'border-radius': '8px',
      'cursor': 'pointer', 'user-select': 'none',
      'opacity': '1', 'visibility': 'visible',
      'text-align': 'center', 'line-height': '1.4',
      'width': 'max-content',
    });
    doc.body.appendChild(btn);
    lockStyle(btn, {
      'left': Math.round((win.innerWidth  - btn.offsetWidth)  / 2) + 'px',
      'top':  Math.round((win.innerHeight - btn.offsetHeight) / 2) + 'px',
    });
    btn.addEventListener('click', () => { btn.remove(); clearTimeout(gameBtnTimer); openTetris(); });
    gameBtnTimer = setTimeout(() => btn.remove(), 12000);
  };

  // ── 俄罗斯方块
  // ===== 【可调：游戏面板大小】=====
  // GAME_SCALE 是游戏倍率旋钮；格子边长 CELL 默认按屏幕自适应。
  // COLS/ROWS 是棋盘的列数/行数（一般不用动）；DROP_MS 是下落速度（毫秒/格，越大越慢）。
  const GAME_SCALE = 1.0;
  const COLS = 10, ROWS = 16;
  const DROP_MS = 620;
  const _cellFit = Math.min((win.innerWidth - 24) / (COLS + 1), (win.innerHeight - 170) / ROWS);
  const CELL = Math.round(Math.max(16, Math.min(46, _cellFit)) * GAME_SCALE);
  const BTN_H = Math.max(48, Math.round(CELL * 2.4)); // 控制按钮高度
  // ================================
  const PIECES = [
    { m: [[1,1,1,1]],       c: '#7fb0a8' },
    { m: [[1,1],[1,1]],     c: '#d8b86a' },
    { m: [[0,1,0],[1,1,1]], c: '#b08ab8' },
    { m: [[0,1,1],[1,1,0]], c: '#8ab87f' },
    { m: [[1,1,0],[0,1,1]], c: '#c87f7f' },
    { m: [[1,0,0],[1,1,1]], c: '#7f93c8' },
    { m: [[0,0,1],[1,1,1]], c: '#c8a07f' },
  ];
  let tetris = null;

  const openTetris = () => {
    if (gameOpen) return;
    gameOpen = true;
    stopBehavior();
    setFace('idle');
    const prevX = posX, prevY = posY;

    const panel = doc.createElement('div');
    panel.id = 'mlfz-tetris-panel';
    lockStyle(panel, {
      'position': 'fixed', 'z-index': '100001',
      'width': (COLS * CELL + 36) + 'px',
      'background': '#2e2a28', 'border': '3px solid #6f6058',
      'border-radius': '10px', 'padding': '10px 16px 14px',
      'box-shadow': '0 8px 30px rgba(0,0,0,0.55)',
      'font-family': 'monospace, sans-serif',
      'box-sizing': 'content-box', 'user-select': 'none',
      'opacity': '1', 'visibility': 'visible',
      'transform': 'none', 'margin': '0',
      'max-width': 'none', 'max-height': 'none',
      'touch-action': 'manipulation',
    });

    const header = doc.createElement('div');
    lockStyle(header, { 'display': 'flex', 'justify-content': 'space-between', 'align-items': 'center', 'margin-bottom': '8px', 'background': 'transparent' });
    const titleEl = doc.createElement('span');
    titleEl.textContent = '咪的游戏机';
    lockStyle(titleEl, { 'color': '#e9dfd2', 'font-size': '14px', 'font-weight': 'bold', 'font-family': 'monospace, sans-serif', 'background': 'transparent' });
    const closeBtn = doc.createElement('span');
    closeBtn.textContent = '✕';
    lockStyle(closeBtn, { 'color': '#e9dfd2', 'font-size': '18px', 'cursor': 'pointer', 'padding': '0 4px', 'font-family': 'monospace, sans-serif', 'background': 'transparent' });
    header.appendChild(titleEl); header.appendChild(closeBtn);
    panel.appendChild(header);

    const canvas = doc.createElement('canvas');
    canvas.width = COLS * CELL; canvas.height = ROWS * CELL;
    lockStyle(canvas, { 'display': 'block', 'background': '#1d1a18', 'border': '2px solid #4a4038', 'border-radius': '4px', 'opacity': '1', 'touch-action': 'manipulation' });
    panel.appendChild(canvas);

    const info = doc.createElement('div');
    info.textContent = '行数 0';
    lockStyle(info, { 'color': '#bfae9d', 'font-size': '12px', 'margin': '6px 0 8px', 'font-family': 'monospace, sans-serif', 'background': 'transparent' });
    panel.appendChild(info);

    const ctrlRow = doc.createElement('div');
    lockStyle(ctrlRow, { 'display': 'flex', 'justify-content': 'space-between', 'gap': '6px', 'background': 'transparent' });
    const mkBtn = (label) => {
      const b = doc.createElement('button');
      b.textContent = label;
      lockStyle(b, { 'flex': '1', 'height': BTN_H + 'px', 'font-size': Math.round(BTN_H * 0.42) + 'px', 'background': '#4a4038', 'color': '#e9dfd2', 'border': '2px solid #6f6058', 'border-radius': '6px', 'font-family': 'monospace, sans-serif', 'cursor': 'pointer', 'opacity': '1', 'margin': '0', 'padding': '0', 'touch-action': 'manipulation', 'user-select': 'none', '-webkit-user-select': 'none' });
      ctrlRow.appendChild(b); return b;
    };
    const btnL = mkBtn('◀'), btnRot = mkBtn('↻'), btnR = mkBtn('▶'), btnD = mkBtn('▼');
    panel.appendChild(ctrlRow);
    doc.body.appendChild(panel);

    const placePanel = () => {
      const pw = panel.offsetWidth, ph = panel.offsetHeight;
      const left = Math.max(8, Math.round((win.innerWidth  - pw) / 2));
      // 给猫的可见身体（去掉底部透明边距）留足上方空间
      const top  = Math.max(CAT_H - BOTTOM_PAD - 2, Math.round((win.innerHeight - ph) / 2));
      lockStyle(panel, { 'left': left + 'px', 'top': top + 'px' });
      const catX = left + Math.round((pw - CAT_W) / 2);
      // 把底部透明边距补偿掉，再叠4px让脚踩在边框上
      const catY = top - CAT_H + BOTTOM_PAD + 4;
      setPos(catX, catY, true);
    };
    placePanel();
    const onResize = () => placePanel();
    win.addEventListener('resize', onResize);
    setTimeout(() => say(pick(LINES.gameWatch), 2600), 600);

    const ctx = canvas.getContext('2d');
    const board = Array.from({ length: ROWS }, () => Array(COLS).fill(null));
    let cur = null, curX = 0, curY = 0, lines = 0, winSaid = false, over = false;

    const collide = (m, x, y) => {
      for (let r = 0; r < m.length; r++)
        for (let c = 0; c < m[r].length; c++) {
          if (!m[r][c]) continue;
          const nx = x + c, ny = y + r;
          if (nx < 0 || nx >= COLS || ny >= ROWS) return true;
          if (ny >= 0 && board[ny][nx]) return true;
        }
      return false;
    };
    const newPiece = () => {
      const p = PIECES[Math.floor(Math.random() * PIECES.length)];
      cur = { m: p.m.map(r => [...r]), c: p.c };
      curX = Math.floor((COLS - cur.m[0].length) / 2); curY = 0;
      if (collide(cur.m, curX, curY)) gameOver();
    };
    const merge = () => { cur.m.forEach((row, r) => row.forEach((v, c) => { if (v && curY + r >= 0) board[curY + r][curX + c] = cur.c; })); };
    const clearLines = () => {
      let n = 0;
      for (let r = ROWS - 1; r >= 0; r--) {
        if (board[r].every(v => v)) { board.splice(r, 1); board.unshift(Array(COLS).fill(null)); n++; r++; }
      }
      if (n > 0) {
        lines += n; info.textContent = '行数 ' + lines;
        if (lines >= 10 && !winSaid) { winSaid = true; say(pick(LINES.gameWin), 3000); }
      }
    };
    const rotate = () => { const m = cur.m[0].map((_, i) => cur.m.map(r => r[i]).reverse()); if (!collide(m, curX, curY)) cur.m = m; };
    const move = (dx) => { if (!collide(cur.m, curX + dx, curY)) curX += dx; };
    const hardDrop = () => { while (!collide(cur.m, curX, curY + 1)) curY++; merge(); clearLines(); newPiece(); draw(); };
    const tick = () => {
      if (over) return;
      if (collide(cur.m, curX, curY + 1)) { merge(); clearLines(); newPiece(); } else { curY++; }
      draw();
    };
    const draw = () => {
      ctx.fillStyle = '#1d1a18'; ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.strokeStyle = 'rgba(255,255,255,0.04)';
      for (let r = 0; r <= ROWS; r++) { ctx.beginPath(); ctx.moveTo(0, r*CELL); ctx.lineTo(COLS*CELL, r*CELL); ctx.stroke(); }
      for (let c = 0; c <= COLS; c++) { ctx.beginPath(); ctx.moveTo(c*CELL, 0); ctx.lineTo(c*CELL, ROWS*CELL); ctx.stroke(); }
      const cell = (x, y, color) => {
        ctx.fillStyle = color; ctx.fillRect(x*CELL+1, y*CELL+1, CELL-2, CELL-2);
        ctx.fillStyle = 'rgba(255,255,255,0.18)'; ctx.fillRect(x*CELL+1, y*CELL+1, CELL-2, 3);
      };
      board.forEach((row, r) => row.forEach((v, c) => { if (v) cell(c, r, v); }));
      if (cur) cur.m.forEach((row, r) => row.forEach((v, c) => { if (v && curY+r >= 0) cell(curX+c, curY+r, cur.c); }));
      if (over) {
        ctx.fillStyle = 'rgba(0,0,0,0.62)'; ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = '#e9dfd2'; ctx.font = 'bold 20px monospace'; ctx.textAlign = 'center';
        ctx.fillText('GAME OVER', canvas.width/2, canvas.height/2-8);
        ctx.font = '13px monospace'; ctx.fillText('点这里再来一局', canvas.width/2, canvas.height/2+18);
      }
    };
    let gravity = setInterval(tick, DROP_MS);
    const gameOver = () => { over = true; clearInterval(gravity); say(pick(LINES.gameLose), 3200); draw(); };
    const restart = () => {
      for (let r = 0; r < ROWS; r++) board[r] = Array(COLS).fill(null);
      lines = 0; winSaid = false; over = false; info.textContent = '行数 0';
      newPiece(); clearInterval(gravity); gravity = setInterval(tick, DROP_MS); draw();
    };
    canvas.addEventListener('click', () => { if (over) restart(); });
    // pointerdown 而非 click：按下立即响应，去掉移动端点击延迟；preventDefault 防误选/误缩放
    const tapBtn = (el, fn) => el.addEventListener('pointerdown', (e) => { e.preventDefault(); if (!over) { fn(); draw(); } });
    tapBtn(btnL,   () => move(-1));
    tapBtn(btnR,   () => move(1));
    tapBtn(btnRot, () => rotate());
    btnD.addEventListener('pointerdown', (e) => { e.preventDefault(); if (!over) hardDrop(); });
    const keyHandler = (e) => {
      if (over) return;
      if (['ArrowLeft','ArrowRight','ArrowUp','ArrowDown',' '].includes(e.key)) e.preventDefault();
      if (e.key==='ArrowLeft')  { move(-1); draw(); }
      if (e.key==='ArrowRight') { move(1);  draw(); }
      if (e.key==='ArrowUp')    { rotate(); draw(); }
      if (e.key==='ArrowDown')  { tick(); }
      if (e.key===' ')          { hardDrop(); }
    };
    doc.addEventListener('keydown', keyHandler);
    newPiece(); draw();

    const closeGame = () => {
      clearInterval(gravity);
      doc.removeEventListener('keydown', keyHandler);
      win.removeEventListener('resize', onResize);
      panel.remove(); gameOpen = false; tetris = null;
      setPos(prevX, prevY);
      say(LINES.gameClose, 2000);
      startBehavior();
    };
    closeBtn.addEventListener('click', closeGame);
    tetris = { panel, get gravity() { return gravity; }, keyHandler, onResize };
  };

  // ── 防沉迷
  // ===== 【可调：防沉迷提醒时长】玩满这么久(毫秒)猫会生气提醒休息。1800000=30分钟。测试时可临时改小（如 30000=30秒）=====
  const LIMIT_MS = 1800000;
  let totalTime = 0, lastTime = Date.now();
  const antiAddict = setInterval(() => {
    const now = Date.now();
    if (doc.visibilityState === 'visible') {
      // 单次增量封顶15s：切后台时定时器被浏览器节流，回前台首个tick的
      // 时间差会包含整段后台时长，封顶后挂机时间不会被误算成游玩时间
      totalTime += Math.min(now - lastTime, 15000);
      if (totalTime > LIMIT_MS) {
        setFace('angry');
        say(pick(LINES.remind), 5000);
        setTimeout(() => { if (state === 'angry') setFace('idle'); }, 5400);
        totalTime = 0;
      }
    }
    lastTime = now;
  }, 10000);
  // 回到前台瞬间重置计时锚点，双保险
  doc.addEventListener('visibilitychange', () => { lastTime = Date.now(); });

  // ── 卸载清理：页面关闭/刷新时清掉定时器与节点
  win.addEventListener('beforeunload', () => {
    stopBehavior(); clearInterval(antiAddict);
    if (tetris) { clearInterval(tetris.gravity); doc.removeEventListener('keydown', tetris.keyHandler); win.removeEventListener('resize', tetris.onResize); }
    doc.getElementById('mlfz-pet-container')?.remove();
    doc.getElementById('mlfz-pet-style')?.remove();
    doc.getElementById('mlfz-tetris-panel')?.remove();
    doc.getElementById('mlfz-game-btn')?.remove();
  });
})();

  </script>
</body>
